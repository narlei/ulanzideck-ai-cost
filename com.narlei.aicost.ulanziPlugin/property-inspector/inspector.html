<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,minimum-scale=1,user-scalable=no,minimal-ui,viewport-fit=cover" />
  <title>AI Cost Monitor</title>
  <link rel="stylesheet" href="../libs/css/uspi.css">
  <style>
    .panel { padding: 10px 12px; font-size: 12px; line-height: 1.6; }
    .field { margin-bottom: 12px; }
    .field label { display: block; font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; opacity: 0.7; margin-bottom: 4px; }
    .field select { width: 100%; box-sizing: border-box; }
    .field input[type="number"] { width: 100%; box-sizing: border-box; background: #2c2c2f; color: #ffffff; border: 1px solid #444; padding: 4px 6px; border-radius: 3px; }
    .divider { border: none; border-top: 1px solid rgba(255,255,255,0.1); margin: 10px 0; }
    .hint { font-size: 11px; opacity: 0.55; margin-top: 4px; }
  </style>
</head>
<body>
  <div class="udpi-wrapper hidden uspi-wrapper">
    <form id="property-inspector">
      <div class="panel">
        <div class="field">
          <label>Platform</label>
          <select id="provider">
            <option value="total">Total (all platforms)</option>
            <option value="aider">Aider</option>
            <option value="antigravity">Antigravity</option>
            <option value="claude" selected>Claude</option>
            <option value="codex">Codex</option>
            <option value="continue">Continue</option>
            <option value="copilot">Copilot</option>
            <option value="cursor">Cursor</option>
            <option value="cursor agent">Cursor Agent</option>
            <option value="gemini">Gemini</option>
            <option value="supermaven">Supermaven</option>
            <option value="windsurf">Windsurf</option>
          </select>
        </div>
        <div class="field">
          <label>Period</label>
          <select id="period">
            <option value="today" selected>Today</option>
            <option value="week">Last 7 days</option>
            <option value="month">This month</option>
            <option value="30days">Last 30 days</option>
            <option value="all">All time</option>
          </select>
          <p class="hint">Longer periods take more time to scan on first load.</p>
        </div>
        <div class="field">
          <label>Limit (USD, 0 = none)</label>
          <input type="number" id="limit" min="0" step="1" value="0" placeholder="0">
          <p class="hint">When set, shows a progress bar toward your spending goal.</p>
        </div>
        <hr class="divider">
        <p class="hint">Cost data is read locally from AI tool session files via <a href="#" id="cb-link">codeburn</a> (MIT). No API keys required.</p>
      </div>
    </form>
  </div>

  <script src="../libs/js/constants.js"></script>
  <script src="../libs/js/eventEmitter.js"></script>
  <script src="../libs/js/timers.js"></script>
  <script src="../libs/js/utils.js"></script>
  <script src="../libs/js/ulanziApi.js"></script>
  <script src="./inspector.js"></script>
</body>
</html>
