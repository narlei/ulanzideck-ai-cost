<svg viewBox="0 0 128 128" width="512" height="512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#23262e"/>
      <stop offset="1" stop-color="#15161b"/>
    </linearGradient>
    <linearGradient id="line" x1="0" y1="1" x2="1" y2="0">
      <stop offset="0" stop-color="#3b82f6"/>
      <stop offset="0.55" stop-color="#5b8cff"/>
      <stop offset="1" stop-color="#3ecf6b"/>
    </linearGradient>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="3" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- background -->
  <rect width="128" height="128" rx="28" fill="url(#bg)"/>
  <rect x="0.75" y="0.75" width="126.5" height="126.5" rx="27.25" fill="none" stroke="#ffffff" stroke-opacity="0.06" stroke-width="1.5"/>

  <!-- baseline grid -->
  <g stroke="#ffffff" stroke-opacity="0.06" stroke-width="2" stroke-linecap="round">
    <line x1="24" y1="98" x2="104" y2="98"/>
  </g>

  <!-- rising line chart -->
  <polyline points="24,88 47,64 66,77 104,36"
    fill="none" stroke="url(#line)" stroke-width="9"
    stroke-linecap="round" stroke-linejoin="round" filter="url(#glow)"/>

  <!-- vertex dots -->
  <circle cx="47" cy="64" r="4.5" fill="#0d0e12" stroke="#5b8cff" stroke-width="3.5"/>
  <circle cx="66" cy="77" r="4.5" fill="#0d0e12" stroke="#5b8cff" stroke-width="3.5"/>

  <!-- highlight endpoint -->
  <circle cx="104" cy="36" r="13" fill="#ff7a50" opacity="0.22"/>
  <circle cx="104" cy="36" r="8.5" fill="#ff7a50"/>
  <circle cx="104" cy="36" r="3.2" fill="#fff3ee"/>
</svg>
