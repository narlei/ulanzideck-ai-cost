name: Release

on:
  push:
    branches: [main]
    paths:
      - com.narlei.aicost.ulanziPlugin/manifest.json

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Read version from manifest
        id: version
        run: echo "version=$(jq -r .Version com.narlei.aicost.ulanziPlugin/manifest.json)" >> "$GITHUB_OUTPUT"

      - name: Check if release already exists
        id: check
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view "v${{ steps.version.outputs.version }}" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "Release v${{ steps.version.outputs.version }} already exists — skipping."
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup Node
        if: steps.check.outputs.exists == 'false'
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Build plugin ZIP
        if: steps.check.outputs.exists == 'false'
        run: make package

      - name: Create release
        if: steps.check.outputs.exists == 'false'
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          gh release create "v$VERSION" \
            --repo "$GITHUB_REPOSITORY" \
            --title "v$VERSION" \
            --notes "## Install

\`\`\`bash
/bin/bash -c \"\$(curl -fsSL https://raw.githubusercontent.com/narlei/ulanzideck-ai-cost/main/install.sh)\"
\`\`\`

Requires macOS and [Ulanzi Studio](https://www.ulanzi.com/pages/download). Node.js ≥ 22 must be available (\`brew install node\`).

## What's included

- One button per AI platform (Claude, Codex, Cursor, Gemini, Copilot, and more)
- Real dollar amounts read locally — no API keys, nothing leaves your machine
- Optional spend limit with live progress bar (green → yellow → orange → red)
- Data refreshes every 15 minutes in the background; click any button to force a refresh" \
            --latest \
            dist/com.narlei.aicost.ulanziPlugin.zip
