<!doctype html>
<html><head><meta charset="utf-8">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="buttons/buttons.css">
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  html,body { width:1200px; height:800px; overflow:hidden; }
  body { font-family:'Manrope',-apple-system,sans-serif;
    background:radial-gradient(1100px 800px at 50% -10%, #20242c 0%, #14161b 48%, #0d0e12 100%);
    color:#fff; position:relative; }
  .grain { position:absolute; inset:0;
    background:radial-gradient(circle at 20% 16%, rgba(91,140,255,.10), transparent 42%),
               radial-gradient(circle at 82% 86%, rgba(255,120,80,.08), transparent 46%); }
  .wrap { position:relative; width:100%; height:100%;
    display:flex; flex-direction:column; align-items:center; padding:58px 64px 54px; }
  .brandrow { display:flex; align-items:center; gap:15px; }
  .mark { width:58px; height:58px; border-radius:15px; background:#16171c center/cover no-repeat;
    border:1px solid rgba(255,255,255,.08);
    box-shadow:0 10px 28px rgba(0,0,0,.5); }
  .brandtxt h1 { font-family:'Space Grotesk'; font-size:32px; font-weight:700; letter-spacing:-.5px; }
  .brandtxt p { font-size:13px; color:#8b93a3; font-weight:600; letter-spacing:.3px; margin-top:2px; }

  .deck { margin-top:36px; width:610px; border-radius:32px; padding:26px;
    background:linear-gradient(160deg,#2a2d35 0%, #202329 60%, #191b20 100%);
    border:1px solid rgba(255,255,255,.07);
    box-shadow:0 40px 90px -22px rgba(0,0,0,.75), inset 0 1px 0 rgba(255,255,255,.05); }
  .ustudio { text-align:center; color:#6b7280; font-family:'Space Grotesk';
    font-weight:600; font-size:13px; letter-spacing:5px; margin-bottom:18px; }
  .grid { display:grid; grid-template-columns:repeat(4,1fr); gap:14px; }
  .key { aspect-ratio:1; border-radius:15px; background:#0c0d10 center/cover no-repeat;
    border:1px solid rgba(255,255,255,.05);
    box-shadow:inset 0 0 0 1px rgba(255,255,255,.02), 0 6px 14px rgba(0,0,0,.4); }
  .empty { background:#0c0d10; }
  .k-claude{background-image:var(--btn-claude)} .k-cursor{background-image:var(--btn-cursor)}
  .k-total{background-image:var(--btn-total)} .k-limit{background-image:var(--btn-limit-80)}

  .tagline { margin-top:auto; text-align:center; }
  .tagline .big { font-family:'Space Grotesk'; font-size:40px; font-weight:700;
    letter-spacing:-1px; line-height:1.08; }
  .tagline .big .accent { background:linear-gradient(90deg,#3ecf6b,#5b8cff);
    -webkit-background-clip:text; background-clip:text; color:transparent; }
  .tagline .small { margin-top:12px; font-size:16px; color:#9aa2b1; font-weight:500; }
  .chips { margin-top:18px; display:flex; gap:10px; justify-content:center; }
  .chip { font-size:12px; font-weight:600; color:#b9c0cd; padding:7px 14px;
    border-radius:999px; background:rgba(255,255,255,.05); border:1px solid rgba(255,255,255,.07); }
</style></head>
<body>
  <div class="grain"></div>
  <div class="wrap">
    <div class="brandrow">
      <div class="mark" style="background-image:url(../com.narlei.aicost.ulanziPlugin/resources/icon.svg)"></div>
      <div class="brandtxt"><h1>AI Cost Monitor</h1><p>UlanziDeck · macOS</p></div>
    </div>

    <div class="deck">
      <div class="ustudio">U · STUDIO</div>
      <div class="grid">
        <div class="key k-claude"></div>
        <div class="key k-cursor"></div>
        <div class="key k-total"></div>
        <div class="key k-limit"></div>
        <div class="key empty"></div><div class="key empty"></div>
        <div class="key empty"></div><div class="key empty"></div>
      </div>
    </div>

    <div class="tagline">
      <div class="big">Your AI spend. <span class="accent">On your desk.</span></div>
      <div class="small">Real dollars · per platform · live progress bars</div>
      <div class="chips"><div class="chip">Zero API keys</div><div class="chip">100% local</div><div class="chip">11 platforms</div></div>
    </div>
  </div>
</body></html>
