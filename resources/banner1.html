<!doctype html>
<html><head><meta charset="utf-8">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="buttons/buttons.css">
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  html,body { width:1200px; height:800px; overflow:hidden; }
  body { font-family:'Manrope',-apple-system,sans-serif;
    background:radial-gradient(900px 600px at 18% 10%, #20242c 0%, #14161b 50%, #0d0e12 100%);
    color:#fff; display:flex; }
  .left { width:44%; padding:80px 40px 80px 72px; display:flex; flex-direction:column; justify-content:center; }
  .eyebrow { display:inline-flex; align-items:center; gap:9px; font-size:14px; font-weight:600;
    color:#9aa2b1; letter-spacing:.5px; margin-bottom:24px; }
  .dot { width:9px; height:9px; border-radius:50%; background:#3ecf6b; box-shadow:0 0 12px #3ecf6b; }
  h1 { font-family:'Space Grotesk'; font-size:56px; font-weight:700; letter-spacing:-1.5px; line-height:1.03; }
  h1 .accent { background:linear-gradient(90deg,#5b8cff,#3ecf6b);
    -webkit-background-clip:text; background-clip:text; color:transparent; }
  .lead { margin-top:22px; font-size:18px; line-height:1.5; color:#aab1c0; font-weight:500; max-width:360px; }
  .feats { margin-top:32px; display:flex; flex-direction:column; gap:14px; }
  .feat { display:flex; align-items:center; gap:12px; font-size:16px; color:#cdd3de; font-weight:500; }
  .feat .ck { width:22px; height:22px; border-radius:7px; background:rgba(62,207,107,.18);
    display:flex; align-items:center; justify-content:center; }
  .feat .ck svg { width:13px; height:13px; }

  .right { width:56%; padding:64px 72px 64px 8px; display:flex; align-items:center; }
  .panel { width:100%; }
  .grid { display:grid; grid-template-columns:repeat(3,1fr); gap:18px; }
  .key { aspect-ratio:1; border-radius:18px; background:#0c0d10 center/cover no-repeat;
    border:1px solid rgba(255,255,255,.06);
    box-shadow:0 12px 28px rgba(0,0,0,.4); }
  .k-claude{background-image:var(--btn-claude)} .k-cursor{background-image:var(--btn-cursor)}
  .k-codex{background-image:var(--btn-codex)} .k-gemini{background-image:var(--btn-gemini)}
  .k-copilot{background-image:var(--btn-copilot)} .k-total{background-image:var(--btn-total)}
  .k-windsurf{background-image:var(--btn-windsurf)}
  .more { margin-top:18px; text-align:center; font-size:13px; color:#6b7280; font-weight:600; letter-spacing:.3px; }
</style></head>
<body>
  <div class="left">
    <div class="eyebrow"><span class="dot"></span> SUPPORTED PLATFORMS</div>
    <h1>11 AI tools.<br><span class="accent">One glance.</span></h1>
    <div class="lead">Every coding assistant you use, in real dollars — no dashboards, no API keys.</div>
    <div class="feats">
      <div class="feat"><span class="ck"><svg viewBox="0 0 24 24" fill="none"><path d="M5 12l4 4 10-11" stroke="#3ecf6b" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/></svg></span> One platform per button</div>
      <div class="feat"><span class="ck"><svg viewBox="0 0 24 24" fill="none"><path d="M5 12l4 4 10-11" stroke="#3ecf6b" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/></svg></span> Today · 7 days · month · all time</div>
      <div class="feat"><span class="ck"><svg viewBox="0 0 24 24" fill="none"><path d="M5 12l4 4 10-11" stroke="#3ecf6b" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/></svg></span> A Total button sums them all</div>
    </div>
  </div>
  <div class="right">
    <div class="panel">
      <div class="grid">
        <div class="key k-claude"></div>
        <div class="key k-cursor"></div>
        <div class="key k-codex"></div>
        <div class="key k-gemini"></div>
        <div class="key k-windsurf"></div>
        <div class="key k-total"></div>
      </div>
      <div class="more">+ Gemini CLI, Windsurf, Aider, Continue, Supermaven &amp; more</div>
    </div>
  </div>
</body></html>
